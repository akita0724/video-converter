name: Flutter CI

on: push

permissions:
  contents: write

env:
  FLUTTER_VERSION: "3.44.0"

jobs:
  build-and-release-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v2
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - name: Download ffmpeg (gyan.dev release-essentials, LGPL)
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg-tmp
          $src = (Get-ChildItem ffmpeg-tmp -Directory)[0].FullName
          New-Item -ItemType Directory -Force windows/ffmpeg/bin | Out-Null
          Copy-Item "$src/bin/ffmpeg.exe"  windows/ffmpeg/bin/
          Copy-Item "$src/bin/ffprobe.exe" windows/ffmpeg/bin/
          Copy-Item "$src/LICENSE"         windows/ffmpeg/LICENSE.txt
      - name: Install project dependencies
        run: flutter pub get
      - name: Generate intermediates
        run: flutter pub run build_runner build --delete-conflicting-outputs
      - name: Enable windows build
        run: flutter config --enable-windows-desktop
      - name: Build artifacts
        run: flutter build windows --release
      - name: Archive Release
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath "release-windows-${{github.ref_name}}.zip"
      - name: Windows Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ./release-windows-${{github.ref_name}}.zip

  build-and-release-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v2
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - name: Install project dependencies
        run: flutter pub get
      - name: Enable macos build
        run: flutter config --enable-macos-desktop
      - name: Build artifacts
        run: flutter build macos --release
      - name: Bundle universal ffmpeg/ffprobe and ad-hoc re-sign
        run: |
          set -euo pipefail
          APP_DIR=$(ls -d build/macos/Build/Products/Release/*.app | head -n1)
          MACOS_DIR="$APP_DIR/Contents/MacOS"

          # Intel x86_64 (evermeet.cx) + ARM64 (osxexperts.net) → lipo universal
          # so the bundle works natively on both architectures without Rosetta
          # and without triggering the "Intel support is ending" warning.
          mkdir -p ff/intel ff/arm ff/universal
          curl -fsSL https://evermeet.cx/ffmpeg/getrelease/zip          -o ff/ffmpeg-intel.zip
          curl -fsSL https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip  -o ff/ffprobe-intel.zip
          curl -fsSL https://www.osxexperts.net/ffmpeg81arm.zip          -o ff/ffmpeg-arm.zip
          curl -fsSL https://www.osxexperts.net/ffprobe81arm.zip         -o ff/ffprobe-arm.zip
          unzip -oq ff/ffmpeg-intel.zip  -d ff/intel
          unzip -oq ff/ffprobe-intel.zip -d ff/intel
          unzip -oq ff/ffmpeg-arm.zip    -d ff/arm
          unzip -oq ff/ffprobe-arm.zip   -d ff/arm
          lipo -create -output ff/universal/ffmpeg \
            "$(find ff/intel -name ffmpeg  -type f | head -n1)" \
            "$(find ff/arm   -name ffmpeg  -type f | head -n1)"
          lipo -create -output ff/universal/ffprobe \
            "$(find ff/intel -name ffprobe -type f | head -n1)" \
            "$(find ff/arm   -name ffprobe -type f | head -n1)"

          cp ff/universal/ffmpeg  "$MACOS_DIR/ffmpeg"
          cp ff/universal/ffprobe "$MACOS_DIR/ffprobe"
          chmod +x "$MACOS_DIR/ffmpeg" "$MACOS_DIR/ffprobe"
          xattr -dr com.apple.quarantine "$APP_DIR" || true

          # Re-sign so the bundle's ad-hoc signature covers the newly-added
          # helpers. Inner-out: helpers first, then the whole .app.
          codesign --force --sign - --timestamp=none "$MACOS_DIR/ffmpeg"
          codesign --force --sign - --timestamp=none "$MACOS_DIR/ffprobe"
          codesign --force --deep --sign - --timestamp=none \
            --entitlements macos/Runner/Release.entitlements \
            "$APP_DIR"
          codesign --verify --deep --strict --verbose=2 "$APP_DIR"
      - name: Archive Release
        run: |
          set -euo pipefail
          cd build/macos/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent *.app "$GITHUB_WORKSPACE/release-macos-${{github.ref_name}}.zip"
      - name: macOS Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ./release-macos-${{github.ref_name}}.zip
